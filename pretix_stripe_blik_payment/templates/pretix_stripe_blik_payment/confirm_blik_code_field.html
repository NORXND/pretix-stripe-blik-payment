{% load i18n %}
<div class="form-group">
    <label for="stripe_blik_code">{% trans "BLIK code" %}</label>
    <input type="text" class="form-control" id="stripe_blik_code" name="stripe_blik_code"
           inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="off" required
           placeholder="123456">
    <p class="help-block">
        {% trans "Open your banking app and generate a BLIK code." %}
    </p>
</div>
