{% load i18n %}
<div class="alert alert-info">
    <p>{% trans "To complete your payment, open your banking app, generate a BLIK code, and enter it below." %}</p>
</div>
<form method="post" action="{{ action_url }}">
    {% csrf_token %}
    <div class="form-group">
        <label for="stripe_blik_code">{% trans "BLIK code" %}</label>
        <input type="text" class="form-control" id="stripe_blik_code" name="code"
               inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="off" required
               placeholder="123456">
        <p class="help-block">{% trans "The code is valid for 2 minutes." %}</p>
    </div>
    <button type="submit" class="btn btn-primary mb-2">{% trans "Pay with BLIK" %}</button>
</form>
