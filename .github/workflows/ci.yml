name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gettext \
            poppler-utils \
            build-essential

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev]

      - name: Run compile check
        run: python -m compileall pretix_stripe_blik_payment

      - name: Run mypy
        run: mypy pretix_stripe_blik_payment --config-file pyproject.toml

      - name: Run pyright
        run: pyright

      - name: Build package
        run: python -m build
